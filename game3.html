<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>반응속도 게임</title>

<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: 60px auto;
  background: white;
  color: black;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

img {
  width: 100%;
  border-radius: 15px;
}

h1 {
  margin-top: 20px;
}

.description {
  margin: 20px 0;
  font-size: 16px;
  line-height: 1.6;
}

.info {
  background: #f2f2f2;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.play {
  background: #2a5298;
  color: white;
}

.play:hover {
  background: #1e3c72;
}

.back {
  background: gray;
  color: white;
}

.back:hover {
  background: #555;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo" onclick="location.href='index.html'">
    MINJUN GAMES
  </div>

  <div class="menu">
    <a href="index.html">홈</a>
    <a href="about.html">소개</a>
  </div>
</div>

<div class="container">

  <img src="game3.png">

  <h1>🔥 반응속도 게임</h1>

  <div class="description">
    이 게임은 여러분야의 상식 문제들을 풀어 점수를 내고 친구들과 경쟁을 할 수 있는 게임입니다.
  </div>

  <div class="info">
    🎯 장르: 퀴즈<br>
    👤 제작자: 민준<br>
    📅 업데이트: 2026.02
  </div>

  <button class="play"
    onclick="location.href='https://minjun5072-cyber.github.io/commonsense_game/'">
    🎮 게임 시작
  </button>

  <button class="back"
    onclick="location.href='index.html'">
    ⬅ 돌아가기
  </button>

</div>

</body>
</html>
